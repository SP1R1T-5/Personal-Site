<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Canary Token Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #12151a; --panel: #1a1f27; --border: #2a3140;
    --text: #d7dde6; --muted: #8b94a3;
    --green: #3fb96b; --red: #e5534b; --amber: #d9a13b; --accent: #5b9dd9;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font: 14px/1.5 "Segoe UI", system-ui, sans-serif; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 24px 16px 64px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: var(--muted); margin: 0 0 20px; font-size: 13px; }
  .panel { background: var(--panel); border: 1px solid var(--border);
           border-radius: 8px; padding: 16px; margin-bottom: 20px; }
  .panel h2 { font-size: 14px; margin: 0 0 12px; color: var(--muted);
              text-transform: uppercase; letter-spacing: .05em; }
  form.add { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  form.add .full { grid-column: 1 / -1; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 3px; }
  input, select {
    width: 100%; padding: 7px 9px; border-radius: 5px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text);
  }
  input:focus, select:focus { outline: 1px solid var(--accent); }
  button {
    padding: 7px 14px; border-radius: 5px; border: 1px solid var(--border);
    background: #232b38; color: var(--text); cursor: pointer;
  }
  button:hover { background: #2c3646; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #0d1117; font-weight: 600; }
  button.danger:hover { background: var(--red); color: #fff; }
  .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .toolbar .spacer { flex: 1; }
  #last-refresh { color: var(--muted); font-size: 12px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .05em; }
  tr.hits-row td { background: #161a21; padding: 12px 16px; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 999px;
           font-size: 12px; font-weight: 600; }
  .badge.quiet { background: rgba(63,185,107,.15); color: var(--green); }
  .badge.fired { background: rgba(229,83,75,.18); color: var(--red); }
  .badge.err   { background: rgba(217,161,59,.15); color: var(--amber); }
  .badge.wait  { background: rgba(139,148,163,.15); color: var(--muted); }
  .muted { color: var(--muted); }
  .mono { font-family: Consolas, monospace; font-size: 12px; }
  a { color: var(--accent); }
  .hit { border-left: 3px solid var(--red); padding: 4px 10px; margin: 6px 0; }
  .hit .when { font-weight: 600; }
  details.raw summary { cursor: pointer; color: var(--muted); font-size: 12px; margin-top: 6px; }
  pre { background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
        padding: 10px; overflow: auto; max-height: 300px; font-size: 12px; }
  #form-msg { grid-column: 1 / -1; font-size: 13px; min-height: 18px; }
  #form-msg.error { color: var(--red); }
  #form-msg.ok { color: var(--green); }
  .empty { color: var(--muted); text-align: center; padding: 24px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🐤 Canary Token Dashboard</h1>
  <p class="sub">Local view of your registered canary tokens and their trigger history. Keep this machine-local &mdash; the registry contains auth keys.</p>

  <div class="panel">
    <h2>Add a token</h2>
    <form class="add" id="add-form">
      <div class="full">
        <label for="f-token">Token ID <span class="muted">&mdash; or just paste the whole manage URL from the token email/page</span></label>
        <input id="f-token" required placeholder="e.g. sq0donpvain3q2kwrlgpaslo8  or  https://canarytokens.org/manage?token=...&auth=...">
      </div>
      <div>
        <label for="f-auth">Auth key <span class="muted">(auto-filled if you pasted a manage URL)</span></label>
        <input id="f-auth" placeholder="from the manage link">
      </div>
      <div>
        <label for="f-label">Label</label>
        <input id="f-label" placeholder="e.g. Fake AWS creds on desktop">
      </div>
      <div>
        <label for="f-type">Type</label>
        <select id="f-type">
          <option value="">(unspecified)</option>
          <option>Web bug / URL</option><option>DNS</option><option>AWS keys</option>
          <option>Word document</option><option>PDF</option><option>Excel document</option>
          <option>QR code</option><option>Windows folder</option><option>Email</option>
          <option>Other</option>
        </select>
      </div>
      <div>
        <label for="f-server">Server</label>
        <input id="f-server" value="https://canarytokens.org" placeholder="https://canarytokens.org">
      </div>
      <div class="full">
        <label for="f-notes">Notes <span class="muted">(where is it planted?)</span></label>
        <input id="f-notes" placeholder="optional">
      </div>
      <div class="full">
        <button class="primary" type="submit">Add token</button>
        <span id="form-msg"></span>
      </div>
    </form>
  </div>

  <div class="panel">
    <div class="toolbar">
      <h2 style="margin:0">Tokens</h2>
      <div class="spacer"></div>
      <span id="last-refresh"></span>
      <button id="refresh-btn">↻ Refresh all</button>
    </div>
    <table>
      <thead><tr>
        <th>Label</th><th>Type</th><th>Server</th><th>Status</th>
        <th>Hits</th><th>Last hit</th><th></th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="empty" hidden>No tokens registered yet &mdash; add your first one above.</div>
  </div>
</div>

<script>
"use strict";
const $ = (s) => document.querySelector(s);
let tokens = [];

// All API calls go through here. If the backend requires a password (the
// Cloudflare Worker does; the local server doesn't), a 401 triggers a prompt
// and the password is remembered in localStorage.
async function api(path, opts = {}) {
  const pw = localStorage.getItem("dash_pw");
  opts.headers = Object.assign({}, opts.headers,
    pw ? { "Authorization": "Bearer " + pw } : {});
  const resp = await fetch(path, opts);
  if (resp.status === 401) {
    const entered = prompt("Dashboard password:");
    if (entered === null) throw new Error("unauthorized");
    localStorage.setItem("dash_pw", entered);
    return api(path, opts);
  }
  return resp;
}

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g,
    (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function hitTime(hit) {
  // time_of_hit is an epoch float in most canarytokens versions
  const t = hit.time_of_hit ?? hit.timestamp ?? hit.time;
  if (t == null) return null;
  const n = Number(t);
  if (!Number.isNaN(n) && n > 1e9) return new Date(n * (n < 1e12 ? 1000 : 1));
  const d = new Date(t);
  return Number.isNaN(d.getTime()) ? null : d;
}

function extractHits(data) {
  if (Array.isArray(data)) return data;
  if (Array.isArray(data?.hits)) return data.hits;
  if (Array.isArray(data?.triggered_details?.hits)) return data.triggered_details.hits;
  return [];
}

function manageUrl(t) {
  return `${t.server}/manage?token=${encodeURIComponent(t.token)}&auth=${encodeURIComponent(t.auth)}`;
}

function render() {
  const tbody = $("#rows");
  tbody.innerHTML = "";
  $("#empty").hidden = tokens.length > 0;
  for (const t of tokens) {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><strong>${esc(t.label)}</strong>
          ${t.notes ? `<div class="muted">${esc(t.notes)}</div>` : ""}
          <div class="mono muted">${esc(t.token)}</div></td>
      <td>${esc(t.type) || "<span class='muted'>—</span>"}</td>
      <td class="mono">${esc(new URL(t.server).host)}</td>
      <td><span class="badge wait" id="status-${esc(t.token)}">…</span></td>
      <td id="count-${esc(t.token)}" class="muted">–</td>
      <td id="last-${esc(t.token)}" class="muted">–</td>
      <td>
        <button data-act="details" data-token="${esc(t.token)}">Details</button>
        <a href="${esc(manageUrl(t))}" target="_blank"><button type="button">Manage</button></a>
        <button class="danger" data-act="delete" data-token="${esc(t.token)}">✕</button>
      </td>`;
    tbody.appendChild(tr);
    const hitsRow = document.createElement("tr");
    hitsRow.className = "hits-row";
    hitsRow.hidden = true;
    hitsRow.innerHTML = `<td colspan="7" id="hits-${esc(t.token)}"><span class="muted">Not loaded yet.</span></td>`;
    tbody.appendChild(hitsRow);
  }
}

async function refreshToken(t) {
  const status = document.getElementById(`status-${t.token}`);
  status.className = "badge wait"; status.textContent = "checking…";
  let res;
  try {
    res = await (await api(`/api/incidents?token=${encodeURIComponent(t.token)}`)).json();
  } catch (e) {
    res = { ok: false, error: String(e) };
  }
  const count = document.getElementById(`count-${t.token}`);
  const last = document.getElementById(`last-${t.token}`);
  const hitsCell = document.getElementById(`hits-${t.token}`);
  if (!res.ok) {
    status.className = "badge err"; status.textContent = "error";
    hitsCell.innerHTML = `<span class="muted">Could not fetch incidents: ${esc(res.error)}</span>`;
    return;
  }
  const hits = extractHits(res.data);
  count.textContent = hits.length;
  if (hits.length === 0) {
    status.className = "badge quiet"; status.textContent = "quiet";
    last.textContent = "never";
    hitsCell.innerHTML = `<span class="muted">No incidents recorded. 🎉</span>`;
    return;
  }
  status.className = "badge fired"; status.textContent = "TRIGGERED";
  const dates = hits.map(hitTime).filter(Boolean).sort((a, b) => b - a);
  last.textContent = dates[0] ? dates[0].toLocaleString() : "unknown";
  hitsCell.innerHTML = hits.slice().reverse().map((h) => {
    const d = hitTime(h);
    const geo = h.geo_info || h.geo || {};
    return `<div class="hit">
      <span class="when">${d ? esc(d.toLocaleString()) : "unknown time"}</span>
      &nbsp;·&nbsp; ${esc(h.input_channel || h.channel || "?")}
      &nbsp;·&nbsp; <span class="mono">${esc(h.src_ip || geo.ip || "?")}</span>
      ${geo.city || geo.country ? ` &nbsp;·&nbsp; ${esc([geo.city, geo.country].filter(Boolean).join(", "))}` : ""}
      ${h.useragent ? `<div class="muted mono">${esc(h.useragent)}</div>` : ""}
    </div>`;
  }).join("") +
  `<details class="raw"><summary>raw incident JSON</summary><pre>${esc(JSON.stringify(res.data, null, 2))}</pre></details>`;
}

async function refreshAll() {
  await Promise.allSettled(tokens.map(refreshToken));
  $("#last-refresh").textContent = "last refresh: " + new Date().toLocaleTimeString();
}

async function loadTokens() {
  tokens = await (await api("/api/tokens")).json();
  render();
  await refreshAll();
}

$("#rows").addEventListener("click", async (e) => {
  const btn = e.target.closest("button[data-act]");
  if (!btn) return;
  const id = btn.dataset.token;
  if (btn.dataset.act === "details") {
    document.getElementById(`hits-${id}`).closest("tr").hidden ^= true;
  } else if (btn.dataset.act === "delete") {
    const t = tokens.find((x) => x.token === id);
    if (!confirm(`Remove "${t.label}" from the dashboard?\n(The token itself keeps working — this only removes it from this list.)`)) return;
    await api(`/api/tokens?token=${encodeURIComponent(id)}`, { method: "DELETE" });
    await loadTokens();
  }
});

// Auto-extract token + auth when a manage URL is pasted
$("#f-token").addEventListener("input", () => {
  const v = $("#f-token").value.trim();
  if (v.includes("token=")) {
    try {
      const u = new URL(v);
      const tok = u.searchParams.get("token"), auth = u.searchParams.get("auth");
      if (tok) $("#f-token").value = tok;
      if (auth) $("#f-auth").value = auth;
      if (u.origin !== "null") $("#f-server").value = u.origin;
    } catch { /* not a full URL — leave as-is, server parses too */ }
  }
});

$("#add-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const msg = $("#form-msg");
  msg.className = ""; msg.textContent = "adding…";
  const body = {
    token: $("#f-token").value, auth: $("#f-auth").value,
    label: $("#f-label").value, type: $("#f-type").value,
    server: $("#f-server").value, notes: $("#f-notes").value,
  };
  const resp = await api("/api/tokens", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  const data = await resp.json();
  if (!resp.ok) {
    msg.className = "error"; msg.textContent = data.error || "failed";
    return;
  }
  msg.className = "ok"; msg.textContent = "added ✓";
  e.target.reset(); $("#f-server").value = "https://canarytokens.org";
  await loadTokens();
});

$("#refresh-btn").addEventListener("click", refreshAll);
loadTokens();
</script>
</body>
</html>
